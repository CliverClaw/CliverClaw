services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLIVER_API_URL: ${CLIVER_API_URL:-http://172.17.0.1:7000}
      CLIVER_CHAT_URL: ${CLIVER_CHAT_URL:-http://172.17.0.1:7001}
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-.}/data/config:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-.}/data/workspace:/home/node/.openclaw/workspace
      - ${OPENCLAW_CONFIG_DIR:-.}/data/config/extensions:/home/node/.openclaw/extensions
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-0}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-28789}:18789"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  ngrok:
    image: ngrok/ngrok:latest
    network_mode: "service:openclaw-gateway"
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml
    command: ["start", "--all", "--config", "/etc/ngrok.yml"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - ngrok

  auto-approve:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    network_mode: "service:openclaw-gateway"
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-.}/data/config:/home/node/.openclaw
      - ./auto-approve.sh:/auto-approve.sh:ro
    entrypoint: ["bash", "/auto-approve.sh"]
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    restart: unless-stopped

  # webhook-bridge: REMOVED — the cliver-marketplace plugin handles
  # WebSocket communication directly, no bridge needed.

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      TZ: ${OPENCLAW_TZ:-UTC}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-.}/data/config:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-.}/data/workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
